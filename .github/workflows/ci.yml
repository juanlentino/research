name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-signatures:
    name: Verify commit signatures
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fail on any unverified commit in PR range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Verifying commits in $BASE_SHA..$HEAD_SHA via GitHub API"
          # Uses GitHub's verification API, not `git log %G?`. The CI runner's
          # GPG keyring does not include GitHub's web-flow signing key, so
          # `%G?` returns 'N' for every API-authored commit (Dependabot, OTS
          # bot, Keystatic Cloud, the web UI) even though GitHub flags them
          # as Verified. The API check matches what GitHub's UI shows.
          unverified=()
          for sha in $(git log --pretty=%H "$BASE_SHA..$HEAD_SHA"); do
            verified=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}" \
              --jq '.commit.verification.verified')
            if [ "$verified" != "true" ]; then
              reason=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}" \
                --jq '.commit.verification.reason')
              echo "  ✗ $sha — reason: $reason"
              unverified+=("$sha")
            else
              echo "  ✓ $sha"
            fi
          done
          if [ ${#unverified[@]} -gt 0 ]; then
            echo "::error::${#unverified[@]} unverified commit(s) in PR range"
            exit 1
          fi
          echo "All commits in PR range are verified."

  build:
    name: Typecheck · lint · build · audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Validate Scholar metadata
        run: npm run validate:scholar

      - name: Generate provenance manifest
        run: npm run provenance

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

      # Attest the provenance manifest itself. The manifest enumerates every
      # note's sha256, commit SHA, OTS proof path, and DOI, so one signed
      # attestation covers the entire archive state at this commit.
      - name: Attest provenance manifest
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "provenance.json"

      - name: Upload provenance manifest
        uses: actions/upload-artifact@v4
        with:
          name: provenance
          path: provenance.json
          retention-days: 90
          if-no-files-found: error
