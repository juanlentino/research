version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    # Major-version bumps deliberately declined during post-launch hardening
    # (2026-04-18). Each is a breaking change that warrants a deliberate
    # migration task, not a drive-by Dependabot PR. Revisit in scheduled
    # upgrade cycles.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
